<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#6a0dad"/>
  <title>🎵 माझी Playlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; touch-action:manipulation; }

    body {
      min-height: 100dvh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(160deg, #ff6f00 0%, #e91e63 40%, #7b1fa2 75%, #1a237e 100%);
      display: flex; flex-direction: column; align-items: center;
      padding: env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,16px);
      position: relative;
    }

    /* BUBBLES */
    .bubbles { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
    .bubble {
      position:absolute; border-radius:50%;
      background:rgba(255,255,255,0.07);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform:translateY(110vh); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:0.5; }
      100% { transform:translateY(-10vh); opacity:0; }
    }

    /* MAIN WRAP */
    .wrap {
      position:relative; z-index:1;
      width:100%; max-width:440px;
      display:flex; flex-direction:column;
      align-items:center;
      height:100dvh;
      justify-content:space-evenly;
      padding:6px 0;
    }

    /* TOP LABEL */
    .top-label { text-align:center; color:rgba(255,255,255,0.9); }
    .now { font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; opacity:0.7; }
    .title-main { font-size:1.25rem; font-weight:800; margin-top:2px; }

    /* ALBUM ART */
    .album-wrap { position:relative; width:min(52vw,210px); height:min(52vw,210px); }
    .ring {
      position:absolute; inset:-10px; border-radius:50%;
      border:3px solid rgba(255,255,255,0.25);
      animation:ringPulse 2s ease-in-out infinite;
    }
    .ring2 { inset:-22px; border-color:rgba(255,255,255,0.1); animation-delay:0.4s; }
    @keyframes ringPulse {
      0%,100% { transform:scale(1); opacity:0.6; }
      50%      { transform:scale(1.05); opacity:1; }
    }
    .album-art {
      width:100%; height:100%; border-radius:50%; object-fit:cover;
      border:5px solid rgba(255,255,255,0.4);
      box-shadow:0 0 50px rgba(233,30,99,0.5), 0 0 100px rgba(123,31,162,0.3);
      animation:spin 12s linear infinite paused;
      transition: opacity 0.4s;
    }
    .album-art.playing { animation-play-state:running; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .center-dot {
      position:absolute; inset:0; margin:auto;
      width:26px; height:26px; border-radius:50%;
      background:radial-gradient(circle,#fff 30%,#e91e63 100%);
      box-shadow:0 0 12px rgba(255,255,255,0.8);
    }

    /* SONG INFO */
    .song-info { text-align:center; color:white; padding:0 10px; width:100%; }
    .song-name {
      font-size:1.15rem; font-weight:700;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:85vw; margin:0 auto;
      text-shadow:0 2px 12px rgba(0,0,0,0.4);
    }
    .song-artist { font-size:0.8rem; opacity:0.75; margin-top:2px; }

    /* PROGRESS */
    .progress-wrap { width:88%; }
    .time-row { display:flex; justify-content:space-between; color:rgba(255,255,255,0.7); font-size:0.72rem; margin-bottom:6px; }
    .prog-bar { width:100%; height:5px; background:rgba(255,255,255,0.25); border-radius:10px; cursor:pointer; }
    .prog-fill {
      height:100%; background:linear-gradient(90deg,#fff,#ffd54f);
      border-radius:10px; width:0%; transition:width 0.3s linear; position:relative;
    }
    .prog-fill::after {
      content:''; position:absolute; right:-6px; top:-5px;
      width:15px; height:15px; border-radius:50%;
      background:white; box-shadow:0 0 8px rgba(255,255,255,0.8);
    }

    /* CONTROLS */
    .controls { display:flex; align-items:center; justify-content:center; gap:16px; }
    .btn {
      background:rgba(255,255,255,0.15);
      border:1.5px solid rgba(255,255,255,0.28);
      border-radius:50%; color:white;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; backdrop-filter:blur(10px);
      transition:transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active { transform:scale(0.88); background:rgba(255,255,255,0.3); }
    .btn-xs  { width:40px; height:40px; font-size:0.95rem; }
    .btn-sm  { width:48px; height:48px; font-size:1.1rem; }
    .btn-play {
      width:68px; height:68px; font-size:1.7rem;
      background:rgba(255,255,255,0.92); color:#7b1fa2;
      box-shadow:0 8px 28px rgba(0,0,0,0.3); border:none;
    }
    .btn-play:active { background:rgba(255,255,255,0.7); }

    /* VOLUME */
    .volume-row { display:flex; align-items:center; gap:10px; width:80%; color:rgba(255,255,255,0.75); font-size:1rem; }
    input[type=range] { flex:1; -webkit-appearance:none; height:4px; background:rgba(255,255,255,0.25); border-radius:10px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:white; box-shadow:0 0 6px rgba(255,255,255,0.7); }

    /* ── PLAYLIST PANEL ── */
    .playlist-btn {
      background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.28);
      border-radius:30px; color:white; padding:6px 18px;
      font-size:0.8rem; font-weight:600; cursor:pointer;
      backdrop-filter:blur(10px); display:flex; align-items:center; gap:6px;
      -webkit-tap-highlight-color:transparent;
      transition: background 0.2s;
    }
    .playlist-btn:active { background:rgba(255,255,255,0.28); }

    .playlist-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none;
      transition:opacity 0.3s;
    }
    .playlist-overlay.open { opacity:1; pointer-events:all; }

    .playlist-sheet {
      width:100%; max-height:70dvh;
      background:linear-gradient(180deg,#2d0060 0%,#1a0040 100%);
      border-radius:24px 24px 0 0;
      padding:16px 0 env(safe-area-inset-bottom,20px);
      transform:translateY(100%);
      transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
      overflow-y:auto;
    }
    .playlist-overlay.open .playlist-sheet { transform:translateY(0); }

    .sheet-handle {
      width:40px; height:4px; background:rgba(255,255,255,0.3);
      border-radius:10px; margin:0 auto 14px;
    }
    .sheet-title {
      color:white; font-size:1rem; font-weight:700;
      text-align:center; margin-bottom:12px; opacity:0.9;
    }

    .song-row {
      display:flex; align-items:center; gap:12px;
      padding:10px 20px; cursor:pointer;
      transition:background 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .song-row:active { background:rgba(255,255,255,0.08); }
    .song-row.active { background:rgba(255,255,255,0.12); }

    .song-thumb {
      width:46px; height:46px; border-radius:10px;
      object-fit:cover; flex-shrink:0;
      border:2px solid rgba(255,255,255,0.2);
    }
    .song-meta { flex:1; overflow:hidden; }
    .s-name { color:white; font-size:0.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .s-artist { color:rgba(255,255,255,0.55); font-size:0.74rem; margin-top:1px; }
    .s-dur { color:rgba(255,255,255,0.5); font-size:0.74rem; flex-shrink:0; }

    .playing-indicator {
      width:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .bars { display:flex; gap:2px; align-items:flex-end; height:16px; }
    .bar { width:3px; background:#ffd54f; border-radius:2px; animation:barAnim 0.8s ease infinite; }
    .bar:nth-child(2) { animation-delay:0.15s; }
    .bar:nth-child(3) { animation-delay:0.3s; }
    @keyframes barAnim { 0%,100% { height:4px; } 50% { height:14px; } }

    /* TOAST */
    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
      background:rgba(255,255,255,0.92); color:#6a0dad;
      padding:9px 22px; border-radius:30px;
      font-size:0.82rem; font-weight:600;
      box-shadow:0 4px 20px rgba(0,0,0,0.25);
      transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
      z-index:999; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>
<audio id="audio" preload="auto"></audio>

<div class="wrap">

  <!-- TOP -->
  <div class="top-label">
    <div class="now">✨ आजचा मंत्र ✨</div>
    <div class="title-main">🎶भक्तीमय मंत्र प्लेयर🎶</div>
  </div>

  <!-- ALBUM ART -->
  <div class="album-wrap">
    <div class="ring"></div>
    <div class="ring ring2"></div>
    <img class="album-art" id="albumArt" src="" alt="Album Art"/>
    <div class="center-dot"></div>
  </div>

  <!-- SONG INFO -->
  <div class="song-info">
    <div class="song-name"  id="songName">—</div>
    <div class="song-artist" id="songArtist">🎤 Artist</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="totTime">0:00</span>
    </div>
    <div class="prog-bar" id="progBar">
      <div class="prog-fill" id="progFill"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-xs" id="btnShuffle" title="Shuffle">🔀</button>
    <button class="btn btn-sm" id="btnPrev"    title="Previous">⏮</button>
    <button class="btn btn-play" id="btnPlay"  title="Play/Pause">▶</button>
    <button class="btn btn-sm" id="btnNext"    title="Next">⏭</button>
    <button class="btn btn-xs" id="btnLoop"    title="Loop">🔁</button>
  </div>

  <!-- VOLUME -->
  <div class="volume-row">
    <span>🔈</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.02" value="1"/>
    <span>🔊</span>
  </div>

  <!-- PLAYLIST BUTTON -->
  <button class="playlist-btn" id="openPlaylist">
    ☰ Playlist <span id="plCount"></span>
  </button>

</div>

<!-- PLAYLIST SHEET -->
<div class="playlist-overlay" id="overlay">
  <div class="playlist-sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🎵 Playlist</div>
    <div id="songList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ╔══════════════════════════════════════════╗
// ║  👇 येथे तुमची गाणी add करा             ║
// ╚══════════════════════════════════════════╝
const SONGS = [
  {
    title:  "पहिले गाणे",
    src:    "song1.mp3",
    cover:  "photo1.jpeg"
  },
  {
    title:  "दुसरे गाणे",
    src:    "song2.mp3",
    cover:  "photo1.jpeg"
  },
  {
    title:  "तिसरे गाणे",
    src:    "song3.mp3",
    cover:  "photo1.jpeg"
  },
  // ── आणखी गाणी add करायची असतील तर येथे copy करा:
  // {
  //   title:  "गाण्याचे नाव",
  //   artist: "Artist",
  //   src:    "song4.mp3",
  //   cover:  "photo4.jpg"
  // },
];

// ── Fallback cover (जर photo नसेल तर)
const FALLBACK = "https://picsum.photos/seed/music/400/400";

// ── State
const audio      = document.getElementById('audio');
let curIdx       = 0;
let isPlaying    = false;
let isLooping    = false;
let isShuffling  = false;
let shuffled     = [];

// ── Elements
const albumArt   = document.getElementById('albumArt');
const songNameEl = document.getElementById('songName');
const songArtEl  = document.getElementById('songArtist');
const progFill   = document.getElementById('progFill');
const progBar    = document.getElementById('progBar');
const curTimeEl  = document.getElementById('curTime');
const totTimeEl  = document.getElementById('totTime');
const btnPlay    = document.getElementById('btnPlay');
const btnPrev    = document.getElementById('btnPrev');
const btnNext    = document.getElementById('btnNext');
const btnLoop    = document.getElementById('btnLoop');
const btnShuffle = document.getElementById('btnShuffle');
const volSlider  = document.getElementById('volSlider');
const plCount    = document.getElementById('plCount');
const toastEl    = document.getElementById('toast');
const overlay    = document.getElementById('overlay');
const songList   = document.getElementById('songList');

// ── Helpers
function fmt(s) {
  if (isNaN(s) || !isFinite(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ── Load song
function loadSong(idx, autoplay = false) {
  const s = SONGS[idx];
  curIdx = idx;

  albumArt.style.opacity = '0';
  setTimeout(() => {
    albumArt.src = s.cover || FALLBACK;
    albumArt.onerror = () => { albumArt.src = FALLBACK; };
    albumArt.style.opacity = '1';
  }, 250);

  songNameEl.textContent  = s.title  || '—';
  songArtEl.textContent   = '🎤 ' + (s.artist || 'Unknown');
  audio.src               = s.src;
  progFill.style.width    = '0%';
  curTimeEl.textContent   = '0:00';
  totTimeEl.textContent   = '0:00';

  updateMediaSession(s);
  buildPlaylist();

  if (autoplay) {
    audio.load();
    audio.play().then(() => setPlaying(true)).catch(() => {});
  } else {
    audio.load();
    setPlaying(false);
  }
}

function setPlaying(val) {
  isPlaying = val;
  btnPlay.textContent = val ? '⏸' : '▶';
  if (val) albumArt.classList.add('playing');
  else      albumArt.classList.remove('playing');
}

// ── Play / Pause
function doPlay() {
  audio.play().then(() => {
    setPlaying(true);
    showToast('▶ ' + SONGS[curIdx].title);
  }).catch(() => showToast('❌ File मिळाली नाही: ' + SONGS[curIdx].src));
}
function doPause() { audio.pause(); setPlaying(false); }

btnPlay.addEventListener('click', () => isPlaying ? doPause() : doPlay());

// ── Prev / Next
function playPrev() {
  let idx;
  if (isShuffling) {
    const pos = shuffled.indexOf(curIdx);
    idx = shuffled[(pos - 1 + shuffled.length) % shuffled.length];
  } else {
    idx = (curIdx - 1 + SONGS.length) % SONGS.length;
  }
  loadSong(idx, true);
}
function playNext() {
  let idx;
  if (isShuffling) {
    const pos = shuffled.indexOf(curIdx);
    idx = shuffled[(pos + 1) % shuffled.length];
  } else {
    idx = (curIdx + 1) % SONGS.length;
  }
  loadSong(idx, true);
}

btnPrev.addEventListener('click', playPrev);
btnNext.addEventListener('click', playNext);

// ── Song ended
audio.addEventListener('ended', () => {
  if (isLooping) {
    audio.play();
  } else {
    playNext();
  }
});

// ── Loop / Shuffle
btnLoop.addEventListener('click', () => {
  isLooping = !isLooping;
  btnLoop.style.opacity = isLooping ? '1' : '0.45';
  showToast(isLooping ? '🔁 Loop चालू' : '➡ Loop बंद');
});
btnShuffle.addEventListener('click', () => {
  isShuffling = !isShuffling;
  if (isShuffling) {
    shuffled = [...Array(SONGS.length).keys()].sort(() => Math.random() - 0.5);
  }
  btnShuffle.style.opacity = isShuffling ? '1' : '0.45';
  showToast(isShuffling ? '🔀 Shuffle चालू' : '📋 Shuffle बंद');
});

// ── Volume
volSlider.addEventListener('input', () => { audio.volume = volSlider.value; });

// ── Progress
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progFill.style.width = pct + '%';
  curTimeEl.textContent = fmt(audio.currentTime);
  if (navigator.mediaSession?.setPositionState && isFinite(audio.duration)) {
    navigator.mediaSession.setPositionState({
      duration: audio.duration, playbackRate: 1, position: audio.currentTime
    });
  }
});
audio.addEventListener('loadedmetadata', () => { totTimeEl.textContent = fmt(audio.duration); });

progBar.addEventListener('click', (e) => {
  const r = progBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 0);
});

// ── PLAYLIST UI
function buildPlaylist() {
  plCount.textContent = `(${SONGS.length})`;
  songList.innerHTML = SONGS.map((s, i) => `
    <div class="song-row ${i === curIdx ? 'active' : ''}" data-idx="${i}">
      <img class="song-thumb" src="${s.cover || FALLBACK}"
           onerror="this.src='${FALLBACK}'" alt="cover"/>
      <div class="song-meta">
        <div class="s-name">${s.title}</div>
        <div class="s-artist">${s.artist || ''}</div>
      </div>
      <div class="playing-indicator">
        ${i === curIdx && isPlaying ? `
          <div class="bars">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>` : (i === curIdx ? '▶' : '')}
      </div>
    </div>
  `).join('');

  songList.querySelectorAll('.song-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = +row.dataset.idx;
      closePlaylist();
      loadSong(idx, true);
    });
  });
}

// ── Playlist open/close
document.getElementById('openPlaylist').addEventListener('click', () => {
  buildPlaylist();
  overlay.classList.add('open');
});
function closePlaylist() { overlay.classList.remove('open'); }
overlay.addEventListener('click', (e) => { if (e.target === overlay) closePlaylist(); });

// ── MEDIA SESSION API (Lock Screen)
function updateMediaSession(s) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:   s.title || 'गाणे',
    artist:  s.artist || '',
    album:   'माझी Playlist',
    artwork: [
      { src: s.cover || FALLBACK, sizes:'512x512', type:'image/jpeg' },
      { src: FALLBACK,            sizes:'256x256', type:'image/jpeg' }
    ]
  });
  navigator.mediaSession.setActionHandler('play',         () => doPlay());
  navigator.mediaSession.setActionHandler('pause',        () => doPause());
  navigator.mediaSession.setActionHandler('previoustrack',() => playPrev());
  navigator.mediaSession.setActionHandler('nexttrack',    () => playNext());
  navigator.mediaSession.setActionHandler('seekto', (d) => {
    if (d.seekTime != null) audio.currentTime = d.seekTime;
  });
}
audio.addEventListener('play',  () => { if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing'; });
audio.addEventListener('pause', () => { if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';  });

// ── Visibility change (screen off → back on)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isPlaying && audio.paused) audio.play().catch(()=>{});
});

// ── Init
loadSong(0, false);
buildPlaylist();
btnLoop.style.opacity    = '0.45';
btnShuffle.style.opacity = '0.45';

// ── First tap → auto play
document.body.addEventListener('click', () => {
  if (!isPlaying) doPlay();
}, { once: true });

// ── Bubbles
(function(){
  const wrap = document.getElementById('bubbles');
  for (let i=0; i<14; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const sz = 30 + Math.random()*80;
    b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*8}s;`;
    wrap.appendChild(b);
  }
})();
</script>
</body>
</html>
